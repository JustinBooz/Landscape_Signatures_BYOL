# Master hyperparameters — BYOL Landscape Signatures

project_name: "baukultur_vpr"

data:
  grid_size_meters: 50
  spiral_fallback_radius_meters: 250
  image_width: 4096
  image_height: 2048
  shard_max_size_gb: 1.0
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]
  swiss_geojson_path: "data/switzerland.geojson"
  output_shards_dir: "data/shards"
  geo_pair_radius_metres: 10.0    # Max distance between BYOL positive pairs
  geo_pair_pool_size: 512         # Mining pool — larger = more pairing opportunities
  geo_pair_lat_ref: 47.0

api:
  mapillary_access_token: "YOUR_TOKEN_HERE"

model:
  encoder:
    name: "dinov3_vith16plus"                     # ViT-H patch-16
    local_weights_path: "PATH_TO_MODEL_WEIGHTS"
    patch_size: 16
    embed_dim: 1280                            # ViT-Huge hidden dim
    freeze_weights: true
    precision: "bfloat16"
    use_flash_attention: true

lora:
  r: 16
  lora_alpha: 32
  target_modules: null          # null = auto-detect from backbone

byol:
  tau_start: 0.996              # EMA momentum start
  tau_end: 1.0                  # EMA momentum end (cosine annealed)
  hidden_dim: 2048              # MLP projector / predictor hidden dim
  output_dim: 1280              # Landscape Signature dimensionality
  gem_p_init: 3.0               # Initial GeM exponent

training:
  batch_size: 16                # Micro-batch — effective batch = 8 × 4 = 32 via grad accum
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  resized_crop_scale: [0.7, 1.0] # Conservative crop to preserve architecture
  color_jitter: 
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
  embedding_std_threshold: 0.015 # Collapse detection threshold
  learning_rate: 5.0e-4
  num_epochs: 10
  weight_decay: 0.05
  num_workers: 8                # Restored for high-throughput training
  gradient_clip: 1.0
  shuffle_buffer: 2500          # Increased for better randomness with lower RAM cost
wandb:
  project: "baukultur_vpr"
  entity: null                  # Set to your wandb username
  offline: false                # Enabled online logging as requested

orchestrator:
  max_disk_cache_gb: 750.0
  delete_shards_after_epoch: false
